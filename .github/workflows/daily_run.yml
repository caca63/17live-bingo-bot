name: Daily Bingo Crawler

on:
  schedule:
    - cron: '0 01 * * *' # 每天 UTC 01:00 (台灣時間 00:00) 執行
  workflow_dispatch: # 讓你可以手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 複製專案程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝必要框架套件
        run: |
          pip install -r requirements.txt

      - name: 執行抓取程式
        run: python main.py

      - name: 自動提交更新資料
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add bingo_history.csv
          git commit -m "Update bingo data [skip ci]" || exit 0
          git push